<!DOCTYPE html>
<html>
<head>
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Calculator using javascript - Easy Tutorials</title>
   <link rel="stylesheet" href="style.css">
</head>
<body>

   <div class="container">
   <div class="calculator">
         <form id="calculator-form" onsubmit="return false;">
            <div class="display">
               <input type="text" name="display" id="display" readonly>
            </div>

            <div>
               <input type="button" value="AC" data-action="clear" class="operator">
               <input type="button" value="DE" data-action="delete" class="operator">
               <input type="button" value="%" data-value="%" class="operator">
               <input type="button" value="/" data-value="/" class="operator">
            </div>
            <div>
               <input type="button" value="7" data-value="7">
               <input type="button" value="8" data-value="8">
               <input type="button" value="9" data-value="9">
               <input type="button" value="*" data-value="*" class="operator">
            </div>
            <div>
               <input type="button" value="4" data-value="4">
               <input type="button" value="5" data-value="5">
               <input type="button" value="6" data-value="6">
               <input type="button" value="-" data-value="-" class="operator">
            </div>
            <div>
               <input type="button" value="1" data-value="1">
               <input type="button" value="2" data-value="2">
               <input type="button" value="3" data-value="3">
               <input type="button" value="+" data-value="+" class="operator">
            </div>
            <div>
               <input type="button" value="√" data-action="sqrt" class="operator">
               <input type="button" value="0" data-value="0">
               <input type="button" value="." data-value="." class="operator">
               <input type="button" value="=" data-action="evaluate" class="operator">
            </div>
         </form>
      </div>
   </div>
   <script>
      const form = document.getElementById('calculator-form');
      const display = document.getElementById('display');

      form.addEventListener('click', (event) => {
         const target = event.target;
         if (target.tagName !== 'INPUT' || target.type !== 'button') return;

         const action = target.dataset.action;
         const value = target.dataset.value;

         if (action === 'clear') {
            display.value = '';
            return;
         }

         if (action === 'delete') {
            display.value = display.value.slice(0, -1);
            return;
         }

         if (action === 'sqrt') {
            display.value += '√(';
            return;
         }

         if (action === 'evaluate') {
            evaluateExpression();
            return;
         }

         if (value) {
            display.value += value;
         }
      });

      function evaluateExpression() {
         try {
            const expression = display.value.trim();
            if (!expression) {
               throw new Error('Enter an expression');
            }
            const parser = new ExpressionParser(expression);
            const result = parser.parse();

            if (!Number.isFinite(result)) {
               throw new Error('Result is not finite');
            }

            display.value = String(Number(result.toFixed(10)));
         } catch (error) {
            display.value = `Error: ${error.message}`;
         }
      }

      class ExpressionParser {
         constructor(input) {
            this.input = input;
            this.tokens = this.tokenize(input);
            this.position = 0;
         }

         tokenize(input) {
            const tokens = [];
            let i = 0;

            while (i < input.length) {
               const char = input[i];

               if (char === ' ') {
                  i += 1;
                  continue;
               }

               if ('+-*/()%√'.includes(char)) {
                  tokens.push({ type: 'operator', value: char });
                  i += 1;
                  continue;
               }

               if (/\d|\./.test(char)) {
                  let number = '';
                  let dots = 0;

                  while (i < input.length && /\d|\./.test(input[i])) {
                     if (input[i] === '.') dots += 1;
                     number += input[i];
                     i += 1;
                  }

                  if (dots > 1 || number === '.') {
                     throw new Error('Malformed number');
                  }

                  tokens.push({ type: 'number', value: parseFloat(number) });
                  continue;
               }

               throw new Error(`Invalid character: ${char}`);
            }

            return tokens;
         }

         parse() {
            const value = this.parseExpression();
            if (this.position < this.tokens.length) {
               throw new Error('Malformed input');
            }
            return value;
         }

         parseExpression() {
            let value = this.parseTerm();

            while (this.match('+') || this.match('-')) {
               const operator = this.previous().value;
               const right = this.parseTerm();
               value = operator === '+' ? value + right : value - right;
            }

            return value;
         }

         parseTerm() {
            let value = this.parseUnary();

            while (this.match('*') || this.match('/')) {
               const operator = this.previous().value;
               const right = this.parseUnary();

               if (operator === '/' && right === 0) {
                  throw new Error('Division by zero');
               }

               value = operator === '*' ? value * right : value / right;
            }

            return value;
         }

         parseUnary() {
            if (this.match('+')) return this.parseUnary();
            if (this.match('-')) return -this.parseUnary();
            if (this.match('√')) {
               const value = this.parseUnary();
               if (value < 0) throw new Error('Square root of negative number');
               return Math.sqrt(value);
            }

            return this.parsePostfix();
         }

         parsePostfix() {
            let value = this.parsePrimary();

            while (this.match('%')) {
               value /= 100;
            }

            return value;
         }

         parsePrimary() {
            if (this.matchType('number')) {
               return this.previous().value;
            }

            if (this.match('(')) {
               const value = this.parseExpression();
               if (!this.match(')')) {
                  throw new Error('Missing closing parenthesis');
               }
               return value;
            }

            throw new Error('Malformed input');
         }

         match(expected) {
            if (this.checkOperator(expected)) {
               this.position += 1;
               return true;
            }
            return false;
         }

         matchType(type) {
            if (this.checkType(type)) {
               this.position += 1;
               return true;
            }
            return false;
         }

         checkOperator(expected) {
            if (this.isAtEnd()) return false;
            const token = this.tokens[this.position];
            return token.type === 'operator' && token.value === expected;
         }

         checkType(type) {
            if (this.isAtEnd()) return false;
            return this.tokens[this.position].type === type;
         }

         previous() {
            return this.tokens[this.position - 1];
         }

         isAtEnd() {
            return this.position >= this.tokens.length;
         }
      }
   </script>
</body>
</html>
